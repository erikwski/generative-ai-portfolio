<!-- Onboarding modal — always present, shows/hides via signal -->
<app-onboarding-modal />

<!-- Step 2: Aura command page — shown after onboarding, before layout generation -->
@if (hasOnboarded() && !hasGeneratedLayout()) {
  <app-aura-page />
}

<!-- Step 3: Generative view — shown after user submits a command -->
@if (hasGeneratedLayout()) {
  <app-generative-view />
}

<!-- Persistent persona pill — shown after onboarding -->
@if (hasOnboarded()) {
  <app-floating-persona-pill />
}
