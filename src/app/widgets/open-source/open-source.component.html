<div class="widget-panel open-source">
  <p class="open-source__eyebrow">Open Source</p>
  <h2 class="open-source__headline">{{ headline() }}</h2>
  @if (intro()) {
    <p class="open-source__intro">{{ intro() }}</p>
  }

  <div class="open-source__list">
    @for (proj of projects(); track proj.name) {
      <div class="open-source__item">
        <div class="open-source__item-header">
          <span class="open-source__name">{{ proj.name }}</span>
          <a
            class="open-source__link-icon"
            [href]="proj.link"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="View {{ proj.name }}"
          >
            <mat-icon>open_in_new</mat-icon>
          </a>
        </div>
        <span class="open-source__role">{{ proj.role }}</span>
        @if (proj.desc) {
          <p class="open-source__desc">{{ proj.desc }}</p>
        }
      </div>
    }
  </div>
</div>
