<div class="widget-panel experience-vault">
  <p class="experience-vault__eyebrow">Education & Certifications</p>
  <h2 class="experience-vault__headline">{{ headline() }}</h2>

  <div class="experience-vault__list">
    @for (cred of credentials(); track cred.icon) {
      <div
        class="experience-vault__card"
        [class.experience-vault__card--completed]="cred.completed"
      >
        <span class="experience-vault__card-icon">
          <mat-icon>{{ cred.icon }}</mat-icon>
        </span>

        <div class="experience-vault__card-body">
          <p class="experience-vault__card-title">{{ cred.title }}</p>
          <p class="experience-vault__card-institution">{{ cred.institution }}</p>
        </div>

        <div class="experience-vault__card-meta">
          <span class="experience-vault__card-detail">{{ cred.detail }}</span>
          <span
            class="experience-vault__card-status"
            [class.experience-vault__card-status--done]="cred.completed"
          >
            {{ cred.status }}
          </span>
        </div>
      </div>
    }
  </div>
</div>
