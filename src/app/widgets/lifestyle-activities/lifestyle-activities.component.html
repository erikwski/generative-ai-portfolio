<div class="widget-panel lifestyle-activities">
  <p class="lifestyle-activities__eyebrow">{{ eyebrow() }}</p>
  <h2 class="lifestyle-activities__headline">{{ headline() }}</h2>

  <div class="lifestyle-activities__list">
    @for (activity of activities(); track activity.label) {
      <div class="lifestyle-activities__row">
        <span class="lifestyle-activities__row-icon">
          <mat-icon>{{ activity.icon }}</mat-icon>
        </span>

        <span class="lifestyle-activities__row-label">{{ activity.label }}</span>

        <div class="lifestyle-activities__row-stats">
          <span class="lifestyle-activities__row-metric">{{ activity.metric }}</span>
          @if (activity.unit) {
            <span class="lifestyle-activities__row-unit">{{ activity.unit }}</span>
          }
        </div>
      </div>
    }
  </div>
</div>
